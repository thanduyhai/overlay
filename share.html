<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grow A Garden — Showcase Overlay</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        width: 100%;
        height: 100%;
        background: transparent !important;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
    }

    .stage {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 22px;
        padding: 24px;
    }

    @keyframes pop-in {
        0% { transform: scale(0.6) translateY(20px); opacity: 0; }
        70% { transform: scale(1.06) translateY(-2px); opacity: 1; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    @keyframes rainbow-spin {
        to { --angle: 360deg; }
    }

    @property --angle {
        syntax: '<angle>';
        initial-value: 0deg;
        inherits: false;
    }

    .card {
        position: relative;
        width: 260px;
        height: 300px;
        border-radius: 26px;
        background: radial-gradient(circle at 35% 20%, rgba(255,255,255,0.06), rgba(10, 22, 14, 0.88) 60%);
        border: 3px solid var(--rc, #4fbf5f);
        box-shadow:
            0 0 0 1px rgba(255,255,255,0.05) inset,
            0 0 26px 2px var(--rc, #4fbf5f),
            0 14px 34px rgba(0,0,0,0.55);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        padding: 18px 16px 20px;
        animation: pop-in 0.45s cubic-bezier(.2,.9,.25,1.2) backwards;
    }

    .card.rainbow {
        border-color: transparent;
        background:
            radial-gradient(circle at 35% 20%, rgba(255,255,255,0.06), rgba(10, 22, 14, 0.88) 60%) padding-box,
            conic-gradient(from var(--angle), #ff3b3b, #ffb347, #ffd23f, #5cd66d, #4fb0ff, #c26bff, #ff3b3b) border-box;
        border: 3px solid transparent;
        animation: pop-in 0.45s cubic-bezier(.2,.9,.25,1.2) backwards, rainbow-spin 3s linear infinite;
        box-shadow: 0 0 30px 2px rgba(255,255,255,0.25), 0 14px 34px rgba(0,0,0,0.55);
    }

    .badge {
        position: absolute;
        top: 16px;
        left: 16px;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.5px;
        padding: 6px 14px;
        border-radius: 999px;
        color: #0b1a10;
        background: var(--bc, #3fc1ff);
        box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    }
    .badge.rainbow-badge {
        background: conic-gradient(from var(--angle), #ff3b3b, #ffb347, #ffd23f, #5cd66d, #4fb0ff, #c26bff, #ff3b3b);
        color: #0b1a10;
        animation: rainbow-spin 3s linear infinite;
    }

    .thumb {
        width: 140px;
        height: 140px;
        object-fit: contain;
        filter: drop-shadow(0 10px 18px rgba(0,0,0,0.5));
        margin-bottom: 6px;
    }

    .qty {
        font-size: 48px;
        font-weight: 900;
        color: #fff;
        text-shadow: 0 3px 10px rgba(0,0,0,0.65);
        line-height: 1;
        margin-top: 4px;
    }

    .name {
        font-size: 20px;
        font-weight: 800;
        color: #eafff0;
        text-shadow: 0 2px 8px rgba(0,0,0,0.7);
        margin-top: 6px;
        text-align: center;
    }

    .empty-hint {
        color: rgba(255,255,255,0.55);
        font-size: 14px;
        text-align: center;
        background: rgba(0,0,0,0.35);
        padding: 10px 18px;
        border-radius: 10px;
    }

    @media (max-width: 700px) {
        .card { width: 190px; height: 230px; padding: 14px 12px 16px; }
        .thumb { width: 96px; height: 96px; }
        .qty { font-size: 34px; }
        .name { font-size: 15px; }
        .badge { font-size: 11px; padding: 4px 10px; top: 10px; left: 10px; }
    }
</style>
</head>
<body>

<div class="stage" id="stage">
    <div class="empty-hint">Chưa có item nào — thêm ?showcase=... vào URL</div>
</div>

<script src="items-data.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const encoded = params.get('showcase');
    const stage = document.getElementById('stage');

    function cardHTML(sel, index) {
        const item = ITEM_LOOKUP[sel.id];
        if (!item) return '';

        const isRainbow = !!VARIANT_IS_RAINBOW[sel.variant];
        const rarityColor = RARITY_COLOR[item.rarity] || '#4fbf5f';
        const variantLabel = VARIANT_LABEL[sel.variant];
        const badgeColor = VARIANT_BADGE_COLOR[sel.variant];

        const badge = variantLabel
            ? `<div class="badge ${isRainbow ? 'rainbow-badge' : ''}" style="--bc:${isRainbow ? '' : badgeColor}">${variantLabel}</div>`
            : '';

        return `
            <div class="card ${isRainbow ? 'rainbow' : ''}" style="--rc:${rarityColor}; animation-delay:${index * 0.08}s">
                ${badge}
                <img class="thumb" src="${item.image}" alt="${item.name}"
                     onerror="this.src='https://placehold.co/200x200/0f1a14/4fbf5f?text=${encodeURIComponent(item.name)}'" />
                <div class="qty">×${sel.qty}</div>
                <div class="name">${item.name}</div>
            </div>
        `;
    }

    if (encoded) {
        const selections = decodeShowcase(encoded);
        if (selections.length > 0) {
            stage.innerHTML = selections.map((s, i) => cardHTML(s, i)).join('');
        }
    }
</script>

</body>
</html>
